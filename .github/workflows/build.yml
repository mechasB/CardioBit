name: CardioBit Software CI

on:
  push:
    paths:
      - 'software/**'
    branches: [ main, master ]
  pull_request:
    paths:
      - 'software/**'
    branches: [ main, master ]

jobs:
  # --- JOB 1: Statyczna Analiza Kodu (Teraz jako raport) ---
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Generate Static Analysis Report
      # Usunęliśmy --error-exitcode=1, więc błędy nie przerywają CI
      # Wynik przekierowujemy do pliku cppcheck_report.txt
      run: |
        cppcheck --enable=all --inline-suppr --std=c++17 \
                 --force \
                 --suppress=unusedFunction \
                 --suppress=missingInclude \
                 --suppress=missingIncludeSystem \
                 -I software/CardioBit/Core/Inc \
                 -I software/CardioBit/Drivers/CMSIS/Include \
                 -I software/CardioBit/Drivers/CMSIS/DSP/Include \
                 -I software/CardioBit/Drivers/STM32H7xx_HAL_Driver/Inc \
                 software/CardioBit/Core/Src > cppcheck_report.txt 2>&1 || true

    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-report
        path: cppcheck_report.txt

  # --- JOB 2: Kompilacja projektu ---
  build:
    runs-on: ubuntu-latest
    # Usunęliśmy 'needs: static-analysis', aby kompilacja startowała niezależnie
    defaults:
      run:
        working-directory: software/CardioBit
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install ARM Toolchain
      uses: emilianis/install-arm-none-eabi-gcc@v2
      with:
        release: '13.3.Rel1'

    - name: Install Ninja & CMake
      run: sudo apt-get install -y ninja-build cmake

    - name: Configure CMake
      run: |
        cmake -S . -B build -G Ninja \
        -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake \
        -DCMAKE_BUILD_TYPE=Debug

    - name: Build Project
      run: cmake --build build
